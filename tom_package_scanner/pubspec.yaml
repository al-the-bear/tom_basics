name: tom_package_scanner
description: >-
  Scans a workspace's framework repos and, for each Dart package, derives its
  publication status (released / published / works / not_started) plus its
  license token, version and links. Built on tom_build_base's folder scanning
  and nature detection. Powers the website's module-index generators.
version: 1.0.0
publish_to: none
repository: https://github.com/al-the-bear/tom_basics
homepage: https://github.com/al-the-bear/tom_basics/tree/main/tom_package_scanner
topics:
  - codegen
  - workspace
  - scanner

environment:
  sdk: ^3.10.4

dependencies:
  # FolderScanner / NatureDetector / yamlToMap. Analyzer-free path dep.
  tom_build_base:
    path: ../tom_build_base
  path: ^1.9.0
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
